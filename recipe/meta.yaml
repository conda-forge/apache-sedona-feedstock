{% set name = "apache-sedona" %}
{% set version = "1.9.0" %}


package:
  name: {{ name }}-split
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: cd195a86e3b68e8ccbe8dd66333d7c2403609937f4d3c13c5a627779eec6b7ce

build:
  number: 1

outputs:
  - name: apache-sedona-core
    script: build_apache_sedona_core.sh   # [unix]
    script: bld_apache_sedona_core.bat    # [win]
    requirements:
      build:
        - python                                 # [build_platform != target_platform]
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
      host:
        - pip
        - python
        - setuptools >=68.0.0
        - wheel
      run:
        - python
        - attrs
        - shapely >=1.7.0
    test:
      imports:
        - sedona
      commands:
        - pip check
      requires:
        - pip

  - name: apache-sedona
    requirements:
      host:
        - python
      run:
        - {{ pin_subpackage('apache-sedona-core', exact=True) }}
        - python
        - pyspark
        - rasterio >=1.2.10
        # Explicit dependencies to ensure compatible versions for rasterio/GDAL stack
        - libxml2
        - glib
        - pcre2
    test:
      imports:
        - sedona
        - sedona.core
      commands:
        - pip check
      requires:
        - pip

about:
  home: https://sedona.apache.org
  summary: Apache Sedona is a cluster computing system for processing large-scale spatial data
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dsangillo
    - mxr-conda
    - jiayuasu
