{% set name = "apache-sedona" %}
{% set version = "1.8.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: f6c7a1fd3ff392eea55e3e5ca269b035b1286017d61f129cf4bcf7f0f3faad31

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - setuptools >=68.0.0                    # [python_impl == "cpython" and python_impl_version >= "3.13"]
    - setuptools                             # [python_impl != "cpython" or python_impl_version < "3.13"]
    - wheel
  host:
    - pip
    - python
    - setuptools >=68.0.0                    # [python_impl == "cpython" and python_impl_version >= "3.13"]
    - setuptools                             # [python_impl != "cpython" or python_impl_version < "3.13"]
  run:
    - attrs
    - pyspark
    - python
    - shapely >=1.7.0
    - rasterio >=1.2.10

test:
  imports:
    - sedona
    - sedona.core
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://sedona.apache.org
  summary: Apache Sedona is a cluster computing system for processing large-scale spatial data
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dsangillo
    - mxr-conda
    - jiayuasu
